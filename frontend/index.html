<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina Analyst | Premium Data Intelligence</title>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.padding = '20px';
        div.style.background = '#800';
        div.style.color = '#fff';
        div.style.zIndex = '99999';
        div.innerHTML = '<b>JS Error:</b> ' + msg + '<br>@ ' + url + ':' + line + ':' + col;
        document.body.appendChild(div);
      };
      window.onunhandledrejection = function(event) {
        console.error('Unhandled rejection:', event.reason);
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.bottom = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.padding = '20px';
        div.style.background = '#600';
        div.style.color = '#fff';
        div.style.zIndex = '99999';
        div.innerHTML = '<b>Promise Error:</b> ' + event.reason;
        document.body.appendChild(div);
      };
    </script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  </head>
  <body style="background-color: #020205; color: #fff; margin: 0; font-family: sans-serif;">
    <div id="root">
      <div style="display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 1rem;">
         <div style="font-size: 1.5rem; font-weight: 600; color: #6366f1;">Lumina Analyst</div>
         <div style="color: #64748b; font-size: 0.9rem;">Initializing Intelligence Suite...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
